function useViewport() {
  const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 1024);
  useEffect(() => {
    const onResize = () => setW(window.innerWidth);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);
  return { width: w, isDesktop: w >= 900 };
}

function App() {
  const [screen, setScreen] = useState("welcome");
  const [stack, setStack] = useState([]);
  const [grinder, setGrinder] = useState(GRINDERS[0]);
  const [bean, setBean] = useState(null);
  const [method, setMethod] = useState(null);
  const [recipe, setRecipe] = useState(null);
  const [beanLog, setBeanLog] = useState([
    { name: "Yirgacheffe", roaster: "Blue Tokai", roast: "Light", notes: "Floral, bergamot, citrus", date: "Mar 28" },
  ]);
  const [brewLog, setBrewLog] = useState([
    // Sample seed entry so the journal isn't empty on first launch
    { id: 1, recipeId: "hoff", recipeTitle: "Hoffmann Ultimate V60", method: "v60",
      bean: "Yirgacheffe", grinder: "Comandante C40", date: "Apr 14",
      dose: 15, water: 250, temp: 96, clicks: 23,
      scores: { sweetness: 6, acidity: 8, body: 4, bitterness: 3, aftertaste: 7, overall: 7 },
      notes: "Bright and clean but a bit thin. Floral peaks." },
  ]);
  const [error, setError] = useState(null);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [settings, setSettings] = useState({
    units: "metric", tempUnit: "C", musicAuto: false, notifications: true, name: "Adrian",
  });

  const go = (next) => { setStack((s) => [...s, screen]); setScreen(next); };
  const back = () => {
    setStack((s) => {
      if (s.length === 0) { setScreen("welcome"); return s; }
      const prev = s[s.length - 1];
      setScreen(prev);
      return s.slice(0, -1);
    });
  };

  useEffect(() => {
    const handler = (e) => { console.warn(e); setError(e.message || "something went wrong"); };
    window.addEventListener("error", handler);
    return () => window.removeEventListener("error", handler);
  }, []);

  const ctx = { grinder, setGrinder, bean, setBean, method, setMethod, recipe, setRecipe,
                beanLog, setBeanLog, brewLog, setBrewLog,
                go, back, screen,
                settings, setSettings, openSettings: () => setSettingsOpen(true) };

  const vp = useViewport();

  let view;
  try {
    switch (screen) {
      case "welcome": view = <Welcome ctx={ctx} />; break;
      case "methods": view = <Methods ctx={ctx} />; break;
      case "setup": view = <Setup ctx={ctx} />; break;
      case "recipes": view = <RecipeList ctx={ctx} />; break;
      case "brew": view = <Brew ctx={ctx} />; break;
      case "feed": view = <Feed ctx={ctx} />; break;
      case "beans": view = <BeansLog ctx={ctx} />; break;
      case "scan": view = <ScanBean ctx={ctx} />; break;
      case "submit": view = <SubmitRecipe ctx={ctx} />; break;
      case "cafes": view = <Cafes ctx={ctx} />; break;
      case "glossary": view = <Glossary ctx={ctx} />; break;
      case "discover": view = <Discover ctx={ctx} />; break;
      case "journal": view = <Journal ctx={ctx} />; break;
      case "logbrew": view = <LogBrew ctx={ctx} />; break;
      case "tweak": view = <Tweak ctx={ctx} />; break;
      default: view = <Welcome ctx={ctx} />;
    }
  } catch (e) {
    view = <Crash msg={e.message} onHome={() => { setStack([]); setScreen("welcome"); setError(null); }} />;
  }

  if (vp.isDesktop) {
    return (
      <div style={{ fontFamily: FONT, background: T.bg, color: T.cream, minHeight: "100vh",
                    display: "flex", letterSpacing: "0.01em" }}>
        <SideNav screen={screen} go={(s) => { setStack([]); setScreen(s); }} openSettings={() => setSettingsOpen(true)} />
        <div style={{ flex: 1, minHeight: "100vh", display: "flex", justifyContent: "center" }}>
          <div style={{ width: "100%", maxWidth: 1100, position: "relative" }}>
            {error && <ErrorBar msg={error} onClose={() => setError(null)} />}
            <div className="fade-up" key={screen}>{view}</div>
          </div>
        </div>
        {settingsOpen && <SettingsModal settings={settings} setSettings={setSettings} onClose={() => setSettingsOpen(false)} />}
      </div>
    );
  }

  return (
    <div style={{ fontFamily: FONT, background: T.bg, color: T.cream, minHeight: "100vh",
                  display: "flex", justifyContent: "center", letterSpacing: "0.01em" }}>
      <div style={{ width: "100%", maxWidth: 440, minHeight: "100vh", background: T.bg,
                    position: "relative", paddingBottom: 80,
                    borderLeft: `1px solid ${T.line}`, borderRight: `1px solid ${T.line}` }}>
        {error && <ErrorBar msg={error} onClose={() => setError(null)} />}
        <div className="fade-up" key={screen}>{view}</div>
        {screen !== "welcome" && screen !== "brew" &&
          <BottomNav screen={screen} go={(s) => { setStack([]); setScreen(s); }} />}
      </div>
      {settingsOpen && <SettingsModal settings={settings} setSettings={setSettings} onClose={() => setSettingsOpen(false)} />}
    </div>
  );
}

        )}
        {done && (<>
          <div style={{ display: "flex", alignItems: "center", gap: 8, color: T.accent, marginBottom: 18 }}>
            <Check size={16} /> <span style={{ fontSize: 12, letterSpacing: "0.15em", textTransform: "uppercase" }}>Detected</span>

                <input value={draft[key]} onChange={(e) => setDraft({ ...draft, [key]: e.target.value })} style={input} />
              </div>
            ))}
          </div>
          <button onClick={save} style={{ ...primaryBtn, width: "100%", marginTop: 26 }}>Save bean</button>
        </>)}
      </div>
    </div>
  );
}

/* =========================================================================
   FLAVOR MATCHING ENGINE
   ========================================================================= */
// Map common flavor descriptors to a "profile" — numbers 0-10 on each axis.
// The matcher reads your text, builds your ideal profile, scores each recipe.
const FLAVOR_KEYWORDS = {
  // Sweet / sugary
  sweet: { sweetness: +3, bitterness: -1 },
  sugary: { sweetness: +3 },
  caramel: { sweetness: +2, body: +1 },
  honey: { sweetness: +2, acidity: +1 },
  chocolate: { sweetness: +2, body: +2, bitterness: +1 },
  cocoa: { body: +2, bitterness: +1 },
  vanilla: { sweetness: +2 },
  nutty: { body: +2, sweetness: +1 },
  almond: { body: +1, sweetness: +1 },
  // Fruity / bright
  fruity: { acidity: +3, sweetness: +1 },
  fruit: { acidity: +2, sweetness: +1 },
  berry: { acidity: +3, sweetness: +1 },
  strawberry: { acidity: +2, sweetness: +2 },
  blueberry: { acidity: +3, sweetness: +1 },
  citrus: { acidity: +3 },
  lemon: { acidity: +3 },
  orange: { acidity: +2, sweetness: +1 },
  bergamot: { acidity: +2 },
  tropical: { acidity: +3, sweetness: +2 },
  mango: { acidity: +2, sweetness: +2 },
  peach: { acidity: +1, sweetness: +2 },
  wine: { acidity: +2, body: +1 },
  juicy: { acidity: +2, sweetness: +1 },
  bright: { acidity: +3 },
  crisp: { acidity: +2 },
  // Floral
  floral: { acidity: +2, aftertaste: +1 },
  jasmine: { acidity: +2, aftertaste: +1 },
  tea: { body: -1, aftertaste: +2 },
  delicate: { body: -1, acidity: +1 },
  light: { body: -2, acidity: +1 },
  // Bold / heavy
  bold: { body: +3, bitterness: +1 },
  strong: { body: +3 },
  heavy: { body: +3 },
  full: { body: +2 },
  rich: { body: +2, sweetness: +1 },
  robust: { body: +2, bitterness: +1 },
  bitter: { bitterness: +3 },
  dark: { body: +2, bitterness: +2 },
  smoky: { bitterness: +2, body: +1 },
  earthy: { body: +2, bitterness: +1 },
  // Balance / smooth
  balanced: { sweetness: +1, acidity: 0, body: +1 },
  smooth: { bitterness: -2, body: +1 },
  clean: { bitterness: -1, aftertaste: +1 },
  mellow: { acidity: -2, bitterness: -1 },
  creamy: { body: +2, sweetness: +1 },
  silky: { body: +1, aftertaste: +1 },
  // Avoid
  sour: { acidity: -3 },
  weak: { body: -3 },
  thin: { body: -3 },
  watery: { body: -3 },
  harsh: { bitterness: -2 },
  ashy: { bitterness: -3 },
};

// Each recipe has an implied flavor profile based on its parameters.
// We approximate it: ratio → strength/body; temp → brightness; method → clarity vs body.
function recipeProfile(recipe, methodId) {
  const ratio = recipe.water / recipe.dose;
  const p = { sweetness: 5, acidity: 5, body: 5, bitterness: 5, aftertaste: 5 };

  // Ratio: tighter ratio = stronger, more body, more bitterness
  if (ratio < 13) { p.body += 3; p.bitterness += 2; p.sweetness -= 1; }
  else if (ratio < 15) { p.body += 1; p.bitterness += 1; }
  else if (ratio > 17) { p.body -= 2; p.acidity += 1; }

  // Temp: hotter = more extraction of everything including bitters
  if (recipe.temp >= 96) { p.acidity += 1; p.bitterness += 1; p.sweetness += 1; }
  else if (recipe.temp <= 90) { p.acidity -= 2; p.sweetness += 1; p.bitterness -= 1; }

  // Method-specific characteristics
  const byMethod = {
    v60: { acidity: +2, aftertaste: +2, body: -1 },            // clean, bright, defined
    chemex: { acidity: +1, aftertaste: +2, body: -2 },         // very clean, tea-like
    aeropress: { body: +1, sweetness: +1, bitterness: -1 },    // smooth, forgiving
    french: { body: +3, bitterness: +1, aftertaste: -1 },      // rich, sedimented
    moka: { body: +2, bitterness: +2, sweetness: -1 },         // intense, dark
    espresso: { body: +3, bitterness: +2, sweetness: +1 },     // concentrated
    latte: { body: +2, sweetness: +2, bitterness: -2, acidity: -2 },
    cappuccino: { body: +2, sweetness: +2, bitterness: -1, acidity: -1 },
    flatwhite: { body: +2, sweetness: +1, bitterness: -1, acidity: -1 },
  };
  const mod = byMethod[methodId] || {};
  Object.entries(mod).forEach(([k, v]) => { p[k] = Math.max(0, Math.min(10, p[k] + v)); });

  // Clamp all
  Object.keys(p).forEach((k) => { p[k] = Math.max(0, Math.min(10, p[k])); });
  return p;
}

function parseFlavorText(text) {
  const t = text.toLowerCase();
  const delta = { sweetness: 0, acidity: 0, body: 0, bitterness: 0, aftertaste: 0 };
  const matched = [];
  Object.entries(FLAVOR_KEYWORDS).forEach(([word, effects]) => {
    // Match whole-ish words (avoid partial matches like "lemon" in "melon")
    const re = new RegExp(`\\b${word}\\b`, "i");
    if (re.test(t)) {
      matched.push(word);
      Object.entries(effects).forEach(([axis, v]) => { delta[axis] += v; });
    }
  });
  // Build target profile around neutral 5
  const target = {};
  Object.entries(delta).forEach(([k, v]) => { target[k] = Math.max(0, Math.min(10, 5 + v)); });
  return { target, matched, delta };
}

function scoreRecipeAgainstTarget(recipe, methodId, target) {
  const profile = recipeProfile(recipe, methodId);
  let distance = 0;
  Object.keys(target).forEach((k) => {
    distance += Math.pow(profile[k] - target[k], 2);
  });
  // Quality tiebreaker — higher rating wins ties
  const ratingBoost = (recipe.rating - 4.0) * 0.5;
  return { score: -Math.sqrt(distance) + ratingBoost, profile };
}

function findBestRecipes(target, methodId, topN = 3) {
  // Search ALL recipes across ALL methods if methodId not provided,
  // otherwise limit to the chosen method
  const pool = [];
  Object.entries(RECIPES).forEach(([mId, recipes]) => {
    if (methodId && mId !== methodId) return;
    recipes.forEach((r) => {
      const { score, profile } = scoreRecipeAgainstTarget(r, mId, target);
      pool.push({ recipe: r, methodId: mId, score, profile });
    });
  });
  pool.sort((a, b) => b.score - a.score);
  return pool.slice(0, topN);
}

        </div>
      </button>

      {expanded && (
        <div style={{ padding: "0 22px 20px", borderTop: `1px solid ${T.line}` }}>
          <div style={{ fontSize: 12, color: T.creamDim, fontStyle: "italic",
                        padding: "14px 0 16px", lineHeight: 1.5 }}>
            {data.note}
          </div>
          <div style={{ display: "grid", gap: 8 }}>
            {data.steps.map((s, i) => {
              const isChecked = !!checked[i];
              return (
                <button key={i} onClick={() => setChecked({ ...checked, [i]: !isChecked })} style={{
                  display: "flex", gap: 12, padding: "12px 14px",
                  background: isChecked ? T.bg3 : "transparent",
                  border: `1px solid ${isChecked ? T.accent : T.line}`,
                  borderRadius: 10, color: T.cream, textAlign: "left",
                  transition: "all 0.2s",
                }}>
                  <div style={{
                    width: 20, height: 20, borderRadius: 6, flexShrink: 0, marginTop: 1,
                    border: `1.5px solid ${isChecked ? T.accent : T.creamDim}`,
                    background: isChecked ? T.accent : "transparent",
                    display: "grid", placeItems: "center",
                  }}>
                    {isChecked && <Check size={11} color={T.bg} strokeWidth={3} />}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, marginBottom: 3,
                                  textDecoration: isChecked ? "line-through" : "none",
                                  opacity: isChecked ? 0.5 : 1 }}>
                      {i + 1}. {s.title}
                    </div>
                    <div style={{ fontSize: 11, color: T.creamDim, lineHeight: 1.5 }}>{s.desc}</div>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* =========================================================================
   BREW
   ========================================================================= */
function Brew({ ctx }) {
  const r = ctx.recipe;
  const vp = useViewport();

  // SCALING — number of cups (1 = original)
  const [cups, setCups] = useState(1);
  const scale = cups; // simple multiplier

  const scaled = useMemo(() => ({
    dose: Math.round(r.dose * scale * 10) / 10,
    water: Math.round(r.water * scale),
    milk: r.milk ? Math.round(r.milk * scale) : 0,
    temp: r.temp,
    microns: r.microns,
  }), [r, scale]);

  // Step times scale slightly with volume (more water = longer pour time)
  const timeScale = Math.sqrt(scale); // sqrt feels right — doubling volume ≠ doubling time
  const baseSteps = r?.steps?.length ? r.steps : defaultSteps(r);
  const steps = useMemo(() => baseSteps.map((s) => ({
    ...s,
    t: Math.round(s.t * timeScale),
    pour: Math.round(s.pour * scale),
    desc: scaleDesc(s.desc, scale),
  })), [baseSteps, scale, timeScale]);

  const totalTime = steps.length ? steps[steps.length - 1].t + Math.round(60 * timeScale) : 210;

  const [phase, setPhase] = useState("pre");
  const [t, setT] = useState(0);
  const [music, setMusic] = useState(false);

  useEffect(() => {
    if (phase !== "brewing") return;
    const id = setInterval(() => {
      setT((x) => {
        if (x + 1 >= totalTime) { clearInterval(id); setPhase("done"); return totalTime; }
        return x + 1;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [phase, totalTime]);

  const currentIdx = steps.reduce((acc, s, i) => (t >= s.t ? i : acc), 0);
  const current = steps[currentIdx];
  const next = steps[currentIdx + 1];
  const progress = Math.min(t / totalTime, 1);

  // Grinder clicks scale slightly with volume (slightly coarser for bigger brews — known principle)
  const adjMicrons = Math.round(scaled.microns * (1 + (scale - 1) * 0.05));
  const clicks = useMemo(() => {
    if (!ctx.grinder || !r) return 0;
    const raw = adjMicrons * ctx.grinder.clicksPerMicron;
    // Most grinders work in whole clicks. Comandante & 1Zpresso support half-clicks; round to nearest 0.5.
    // Everything else rounds to whole clicks.
    const supportsHalf = ["c40", "jx", "k6"].includes(ctx.grinder.id);
    return supportsHalf ? Math.round(raw * 2) / 2 : Math.round(raw);
  }, [ctx.grinder, r, adjMicrons]);

  if (phase === "pre") {
    return (
      <div>
        <Header title="Get Ready" onBack={ctx.back} />
        <div style={{ padding: "30px 22px", maxWidth: vp.isDesktop ? 700 : "none", margin: "0 auto" }}>
          <div style={{ fontSize: 28, fontWeight: 200, marginBottom: 6, letterSpacing: "-0.02em" }}>{r.title}</div>
          <div style={{ fontSize: 12, color: T.creamDim, marginBottom: 22 }}>{r.author}</div>

          {/* SERVINGS SCROLLER */}
          <div style={{
            background: T.bg2, border: `1px solid ${T.line}`, borderRadius: 16,
            padding: "18px 22px", marginBottom: 18, display: "flex", alignItems: "center", justifyContent: "space-between",
          }}>
            <div>
              <div style={{ fontSize: 10, letterSpacing: "0.2em", color: T.creamDim, marginBottom: 4 }}>SERVINGS</div>
              <div style={{ fontSize: 22, fontWeight: 300 }}>{cups} cup{cups > 1 ? "s" : ""}</div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <button onClick={() => setCups(Math.max(0.5, +(cups - 0.5).toFixed(1)))} style={{
                width: 38, height: 38, borderRadius: 999, border: `1px solid ${T.line}`,
                background: T.bg3, color: T.cream, display: "grid", placeItems: "center",
              }}><Minus size={14} color={T.cream} /></button>
              <button onClick={() => setCups(Math.min(8, +(cups + 0.5).toFixed(1)))} style={{
                width: 38, height: 38, borderRadius: 999, border: `1px solid ${T.line}`,
                background: T.bg3, color: T.cream, display: "grid", placeItems: "center",
              }}><Plus size={14} color={T.cream} /></button>
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
            <PrepCard icon={<Scale size={16} />} label="Dose" v={`${scaled.dose} g`} sub={ctx.bean?.name} />
            <PrepCard icon={<Droplet size={16} />} label="Water" v={`${scaled.water} g`} sub={`Ratio 1:${Math.round(scaled.water/scaled.dose)}`} />
            <PrepCard icon={<Flame size={16} />} label="Temp" v={`${scaled.temp}°C`} sub="Heat kettle now" />
            <PrepCard icon={<Disc3 size={16} />} label="Grind" v={`${clicks} clicks`} sub={ctx.grinder?.name} />
            {r.hasMilk && (
              <PrepCard icon={<Coffee size={16} />} label="Milk" v={`${scaled.milk} g`} sub="Steamed, ~60°C" />
            )}
          </div>

          <div style={{
            background: T.bg2, border: `1px solid ${T.line}`, borderRadius: 14,
            padding: 18, marginTop: 18, marginBottom: 18,
          }}>
            <div style={{ fontSize: 10, letterSpacing: "0.2em", color: T.creamDim, marginBottom: 12 }}>SCHEDULE</div>
            {steps.map((s, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0",
                borderBottom: i < steps.length - 1 ? `1px solid ${T.line}` : "none" }}>
                <span style={{ fontSize: 13 }}>{s.label}</span>
                <span style={{ fontSize: 12, color: T.creamDim }}>{fmt(s.t)}</span>
              </div>
            ))}
            <div style={{ display: "flex", justifyContent: "space-between", paddingTop: 10, marginTop: 6,
              borderTop: `1px solid ${T.line}`, fontSize: 11, color: T.accent }}>
              <span>Total</span><span>{fmt(totalTime)}</span>
            </div>
          </div>

          {/* PRE-BREW CHECKLIST */}
          <PreBrewChecklist methodId={ctx.method?.id} />

          <button onClick={() => setPhase("brewing")} style={{ ...primaryBtn, width: "100%", marginTop: 8 }}>Start brewing</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: `radial-gradient(ellipse at top, ${T.bg2}, ${T.bg})` }}>
      <Header title="Brewing" onBack={() => { setPhase("pre"); setT(0); }}
        right={<button onClick={() => setMusic(!music)} style={{ ...iconBtn,
          background: music ? T.accent : "transparent", borderColor: music ? T.accent : T.line }}>
          <Music size={14} color={music ? T.bg : T.cream} /></button>} />
      <div style={{ maxWidth: vp.isDesktop ? 700 : "none", margin: "0 auto" }}>
        <div style={{ padding: "30px 22px 10px", position: "relative" }}>
          <BrewScene method={ctx.method?.id} phase={phase} stepLabel={current?.label} progress={progress} hasMilk={r.hasMilk} />
        </div>
        <div style={{ padding: "20px 22px 8px" }}>
          <div style={{
            display: "grid",
            gridTemplateColumns: (next && phase === "brewing") ? "1fr 1px 1fr" : "1fr",
            gap: 20, alignItems: "center",
          }}>
            {/* Elapsed time */}
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 9, color: T.creamDim, letterSpacing: "0.3em", marginBottom: 6 }}>ELAPSED</div>
              <div style={{ fontSize: (next && phase === "brewing") ? 48 : 64,
                            fontWeight: 100, letterSpacing: "-0.04em", color: T.cream,
                            lineHeight: 1, fontVariantNumeric: "tabular-nums" }}>{fmt(t)}</div>
              <div style={{ fontSize: 10, color: T.creamDim, letterSpacing: "0.2em", marginTop: 6 }}>OF {fmt(totalTime)}</div>
            </div>

            {/* Divider */}
            {next && phase === "brewing" && (
              <div style={{ width: 1, height: 80, background: T.line, justifySelf: "center" }} />
            )}

            {/* Next step countdown */}
            {next && phase === "brewing" && (
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 9, color: T.accent, letterSpacing: "0.3em", marginBottom: 6 }}>NEXT IN</div>
                <div style={{ fontSize: 48, fontWeight: 100, letterSpacing: "-0.04em",
                              color: T.accent, lineHeight: 1, fontVariantNumeric: "tabular-nums" }}>
                  {fmt(Math.max(0, next.t - t))}
                </div>
                <div style={{ fontSize: 10, color: T.creamDim, letterSpacing: "0.15em",
                              marginTop: 6, textTransform: "uppercase",
                              overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {next.label}
                </div>
              </div>
            )}
          </div>
        </div>
        <div style={{ padding: "20px 22px" }}>
          <div style={{ height: 2, background: T.line, borderRadius: 2, overflow: "hidden" }}>
            <div style={{ width: `${progress * 100}%`, height: "100%", background: T.accent, transition: "width 0.5s linear" }} />
          </div>
        </div>
        <div style={{ padding: "10px 22px 20px" }}>
          <div style={{ background: T.bg2, border: `1px solid ${T.line}`, borderRadius: 18, padding: 22 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <Pill>STEP {currentIdx + 1} / {steps.length}</Pill>
              {phase === "brewing" && <PulseDot />}
            </div>
            <div style={{ fontSize: 26, fontWeight: 300, letterSpacing: "-0.01em" }}>{current?.label}</div>
            <div style={{ fontSize: 14, color: T.creamDim, marginTop: 6 }}>{current?.desc}</div>
          </div>
        </div>
        {music && <JazzWidget />}
        {phase === "done" && (
          <DoneScreen ctx={ctx} recipe={r} scaled={scaled} clicks={clicks}
                      onReset={() => { setT(0); setPhase("pre"); ctx.back(); }} />
        )}
      </div>
    </div>
  );
}

function DoneScreen({ ctx, recipe, scaled, clicks, onReset }) {
  const vp = useViewport();
  const [overall, setOverall] = useState(7);
  const [saved, setSaved] = useState(false);

  const stashBrew = () => {
    window.__pendingBrew = {
      recipeId: recipe.id, recipeTitle: recipe.title, method: ctx.method?.id,
      bean: ctx.bean?.name || "Unknown", grinder: ctx.grinder?.name || "Unknown",
      dose: scaled.dose, water: scaled.water, temp: scaled.temp, clicks,
    };
  };

  const quickSave = () => {
    // Save a minimal entry with just the overall rating
    const today = new Date().toLocaleDateString("en-US", { month: "short", day: "numeric" });
    ctx.setBrewLog([{
      id: Date.now(),
      recipeId: recipe.id, recipeTitle: recipe.title, method: ctx.method?.id,
      bean: ctx.bean?.name || "Unknown", grinder: ctx.grinder?.name || "Unknown",
      date: today,
      dose: scaled.dose, water: scaled.water, temp: scaled.temp, clicks,
      scores: { sweetness: 5, acidity: 5, body: 5, bitterness: 5, aftertaste: 5, overall },
      notes: "",
      quickLogged: true,
    }, ...ctx.brewLog]);
    setSaved(true);
  };

  const detailedLog = () => {
    stashBrew();
    ctx.go("logbrew");
  };

  if (saved) {
    return (
      <div style={{ padding: "20px 22px 30px", textAlign: "center" }}>
        <Check size={28} color={T.accent} />
        <div style={{ fontSize: 18, fontWeight: 200, marginBottom: 6, marginTop: 12 }}>Saved to your profile</div>
        <div style={{ fontSize: 12, color: T.creamDim, marginBottom: 22 }}>
          View it anytime in your Brew Journal.
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={() => ctx.go("journal")} style={{ ...ghostBtn, flex: 1 }}>View journal</button>
          <button onClick={onReset} style={{ ...primaryBtn, flex: 1 }}>Done</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding: "10px 22px 30px" }}>
      <div style={{ textAlign: "center", marginBottom: 24 }}>
        <Sparkles size={28} color={T.accent} />
        <div style={{ fontSize: 24, fontWeight: 200, marginBottom: 6, marginTop: 10 }}>Your cup is ready</div>
        <div style={{ fontSize: 12, color: T.creamDim }}>How was it?</div>
      </div>

      {/* Quick overall rating — always visible */}
      <div style={{
        background: T.bg2, border: `1px solid ${T.line}`, borderRadius: 16,
        padding: 22, marginBottom: 14,
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div>
            <div style={{ fontSize: 10, letterSpacing: "0.2em", color: T.creamDim, marginBottom: 4 }}>OVERALL RATING</div>
            <div style={{ fontSize: 12, color: T.creamDim }}>Quick score — 1 tap</div>
          </div>
          <div style={{ fontSize: 32, fontWeight: 200, color: T.accent }}>{overall}<span style={{ color: T.creamDim, fontSize: 16 }}>/10</span></div>
        </div>
        <input type="range" min="1" max="10" value={overall}
               onChange={(e) => setOverall(+e.target.value)}
               style={{ width: "100%", accentColor: T.accent }} />
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: T.creamDim, marginTop: 4, letterSpacing: "0.15em" }}>
          <span>UNDRINKABLE</span><span>PERFECT</span>
        </div>
      </div>

      {/* Actions */}
      <div style={{ display: "grid", gap: 10 }}>
        <button onClick={quickSave} style={{ ...primaryBtn, width: "100%" }}>
          Save to profile
        </button>
        <button onClick={detailedLog} style={{ ...ghostBtn, width: "100%" }}>
          Rate in detail (5 axes + notes)
        </button>
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={() => ctx.go("feed")} style={{
            flex: 1, background: "transparent", border: "none", color: T.creamDim,
            fontSize: 11, letterSpacing: "0.15em", textTransform: "uppercase", padding: 12,
          }}>Share</button>
          <button onClick={onReset} style={{
            flex: 1, background: "transparent", border: "none", color: T.creamDim,
            fontSize: 11, letterSpacing: "0.15em", textTransform: "uppercase", padding: 12,
          }}>Skip</button>
        </div>
      </div>
    </div>
  );
}


function defaultSteps(r) {
  return [
    { t: 0, label: "Bloom", desc: `Pour ${Math.round(r.water * 0.2)}g water, swirl gently`, pour: Math.round(r.water * 0.2) },
    { t: 45, label: "Pour 1", desc: `Pour to ${Math.round(r.water * 0.5)}g`, pour: Math.round(r.water * 0.3) },
    { t: 90, label: "Pour 2", desc: `Pour to ${r.water}g`, pour: Math.round(r.water * 0.5) },
    { t: 150, label: "Drawdown", desc: "Wait — let it finish", pour: 0 },
  ];
}
function scaleDesc(desc, scale) {
  if (scale === 1) return desc;
  return desc.replace(/(\d+)g/g, (m, n) => `${Math.round(+n * scale)}g`);
}

function PrepCard({ icon, label, v, sub }) {
  return (
    <div style={{ background: T.bg2, border: `1px solid ${T.line}`, borderRadius: 14, padding: 16 }}>
      <div style={{ color: T.accent, marginBottom: 12 }}>{icon}</div>
      <div style={{ fontSize: 10, letterSpacing: "0.2em", color: T.creamDim }}>{label.toUpperCase()}</div>
      <div style={{ fontSize: 22, fontWeight: 300, marginTop: 4 }}>{v}</div>
      {sub && <div style={{ fontSize: 10, color: T.creamDim, marginTop: 6, overflow: "hidden",
        textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{sub}</div>}
    </div>
  );
}
function PulseDot() {
  return (
    <div style={{ position: "relative", width: 10, height: 10 }}>
      <div style={{ position: "absolute", inset: 0, borderRadius: "50%", background: T.accent,
        animation: "pulse-ring 1.5s ease-out infinite" }} />
      <div style={{ position: "absolute", inset: 2, borderRadius: "50%", background: T.accent }} />
    </div>
  );
}
function fmt(s) { const m = Math.floor(s / 60), sec = s % 60; return `${m}:${String(sec).padStart(2, "0")}`; }

/* =========================================================================
   BREW SCENE — switches based on method
   ========================================================================= */
function BrewScene({ method, phase, stepLabel, progress, hasMilk }) {
  const sceneProps = { phase, stepLabel, progress };
  let Scene;
  if (method === "aeropress") Scene = AeropressScene;
  else if (method === "french") Scene = FrenchPressScene;
  else if (method === "moka") Scene = MokaScene;
  else if (method === "espresso") Scene = EspressoScene;
  else if (method === "chemex") Scene = ChemexScene;
  else if (hasMilk || ["latte","cappuccino","flatwhite"].includes(method)) Scene = MilkScene;
  else Scene = PourOverScene; // v60 default

  return (
    <div style={{
      position: "relative", width: "100%", aspectRatio: "1.4",
      background: `linear-gradient(180deg, ${T.bg3}, ${T.bg2})`,
      border: `1px solid ${T.line}`, borderRadius: 20, overflow: "hidden",
    }}>
      <div style={{ position: "absolute", left: 0, right: 0, bottom: "30%", height: 1, background: T.line }} />
      <div style={{ position: "absolute", top: 0, right: "20%", width: 1, height: 50, background: T.line }} />
      <div style={{ position: "absolute", top: 46, right: "calc(20% - 8px)", width: 18, height: 18,
                    borderRadius: "50%", background: T.accent, opacity: 0.7,
                    boxShadow: `0 0 30px ${T.accent}` }} />
      <Scene {...sceneProps} />
      <div style={{ position: "absolute", top: 16, left: 16, fontSize: 9,
                    letterSpacing: "0.3em", color: T.creamDim }}>● LIVE</div>
      <div style={{ position: "absolute", top: 16, right: 16, fontSize: 9,
                    letterSpacing: "0.3em", color: T.creamDim }}>{(method || "v60").toUpperCase()}</div>
    </div>
  );
}

function PourOverScene({ phase, stepLabel, progress }) {
  const isBlooming = stepLabel?.toLowerCase().includes("bloom");
  const isPouring = stepLabel?.toLowerCase().includes("pour") || isBlooming;
  return (
    <svg viewBox="0 0 400 280" style={{ position: "absolute", inset: 0, width: "100%", height: "100%" }}>
      <g transform="translate(70, 80)" opacity={isPouring ? 1 : 0.4}>
        <path d="M 0 30 L 0 60 Q 0 80 20 80 L 60 80 Q 80 80 80 60 L 80 30 Z" fill={T.bg3} stroke={T.cream} strokeWidth="1.5" />
        <path d="M 30 30 L 30 15 Q 30 8 38 8 L 50 8 Q 58 8 58 15 L 58 30" fill="none" stroke={T.cream} strokeWidth="1.5" />
        <path d="M 80 40 Q 110 40 115 60" fill="none" stroke={T.cream} strokeWidth="1.5" />
        {isPouring && (
          <line x1="118" y1="62" x2="135" y2="105" stroke={T.accent} strokeWidth="2" opacity="0.8">
            <animate attributeName="opacity" values="0.4;1;0.4" dur="0.8s" repeatCount="indefinite" />
          </line>
        )}
      </g>
      <g transform="translate(170, 110)">
        <path d="M 0 0 L 80 0 L 55 50 L 25 50 Z" fill={T.bg3} stroke={T.cream} strokeWidth="1.5" />
        <ellipse cx="40" cy="0" rx="40" ry="6" fill={T.espresso} />
        {isBlooming && (<>
          <ellipse cx="40" cy="-2" rx="36" ry="5" fill={T.brown} opacity="0.7">
            <animate attributeName="ry" values="5;8;5" dur="2s" repeatCount="indefinite" />
          </ellipse>
          {[0,1,2,3,4].map((i) => (
            <circle key={i} cx={20 + i*10} cy="-4" r="2" fill={T.brown} opacity="0.6">
              <animate attributeName="cy" values="-4;-10;-4" dur={`${1.5 + i*0.2}s`} repeatCount="indefinite" />
            </circle>
          ))}
        </>)}
        {isPouring && (
          <line x1="40" y1="50" x2="40" y2="80" stroke={T.brown} strokeWidth="1.5" opacity="0.7">
            <animate attributeName="y2" values="55;90;55" dur="0.6s" repeatCount="indefinite" />
          </line>
        )}
        <path d="M 5 80 L 75 80 L 70 130 Q 70 140 60 140 L 20 140 Q 10 140 10 130 Z" fill={T.bg3} stroke={T.cream} strokeWidth="1.5" />
        <rect x="11" y={140 - 60 * progress} width="58" height={60 * progress} fill={T.brownDeep} opacity="0.9" />
      </g>
      {phase === "brewing" && [0, 1, 2].map((i) => (
        <circle key={i} cx={210 + i * 18} cy="100" r="3" fill={T.cream} opacity="0">
          <animate attributeName="opacity" values="0;0.4;0" dur="2s" begin={`${i * 0.5}s`} repeatCount="indefinite" />
          <animate attributeName="cy" values="100;60;40" dur="2s" begin={`${i * 0.5}s`} repeatCount="indefinite" />
        </circle>
      ))}
    </svg>
  );
}

function ChemexScene({ phase, stepLabel, progress }) {
  const isPouring = stepLabel?.toLowerCase().includes("pour") || stepLabel?.toLowerCase().includes("bloom");
  return (
    <svg viewBox="0 0 400 280" style={{ position: "absolute", inset: 0, width: "100%", height: "100%" }}>
      {/* Chemex hourglass shape */}
      <g transform="translate(150, 60)">
        {/* Top funnel */}
        <path d="M 10 0 L 90 0 L 60 60 L 40 60 Z" fill={T.bg3} stroke={T.cream} strokeWidth="1.5" />
        {/* Wooden collar */}
        <rect x="35" y="62" width="30" height="14" fill={T.brown} opacity="0.7" />
        <rect x="35" y="62" width="30" height="14" fill="none" stroke={T.cream} strokeWidth="1" />
        {/* Bottom bulb */}
        <path d="M 40 76 L 60 76 L 90 160 Q 90 180 75 180 L 25 180 Q 10 180 10 160 Z"
              fill={T.bg3} stroke={T.cream} strokeWidth="1.5" />
        {/* Coffee in bottom */}
        <path d={`M 12 ${180 - 90 * progress} Q 12 180 25 180 L 75 180 Q 88 180 88 ${180 - 90 * progress} Z`}
              fill={T.brownDeep} opacity="0.9" />
        {/* Grounds in funnel */}

function MilkScene({ phase, stepLabel, progress }) {
  const isPullingShot = stepLabel?.toLowerCase().includes("shot") || stepLabel?.toLowerCase().includes("ristretto") || progress < 0.2;
  const isSteaming = stepLabel?.toLowerCase().includes("steam") || stepLabel?.toLowerCase().includes("velvet") || (progress >= 0.2 && progress < 0.6);
  const isPouring = stepLabel?.toLowerCase().includes("pour") || stepLabel?.toLowerCase().includes("layer") || progress >= 0.6;

  return (
    <svg viewBox="0 0 400 280" style={{ position: "absolute", inset: 0, width: "100%", height: "100%" }}>
      <defs>
        <linearGradient id="milkfill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={T.milk} />
          <stop offset="100%" stopColor={T.brown} stopOpacity="0.6" />
        </linearGradient>
      </defs>

      {/* Steam wand (left) */}
      <g transform="translate(50, 30)" opacity={isSteaming ? 1 : 0.3}>
        <line x1="20" y1="0" x2="20" y2="60" stroke={T.cream} strokeWidth="2" />
        <rect x="15" y="60" width="10" height="14" fill={T.bg3} stroke={T.cream} strokeWidth="1" />
        {isSteaming && [0, 1, 2].map((i) => (
          <circle key={i} cx={20 + (i - 1) * 4} cy="80" r="2" fill={T.cream} opacity="0">
            <animate attributeName="opacity" values="0;0.6;0" dur="1.2s" begin={`${i * 0.3}s`} repeatCount="indefinite" />
            <animate attributeName="cy" values="80;100;120" dur="1.2s" begin={`${i * 0.3}s`} repeatCount="indefinite" />
          </circle>
        ))}
      </g>

      {/* Milk pitcher (left mid) */}
      <g transform="translate(40, 95)" opacity={isSteaming || isPouring ? 1 : 0.4}>
        <path d="M 0 0 L 60 0 L 55 60 Q 55 70 45 70 L 15 70 Q 5 70 5 60 Z"
              fill={T.bg3} stroke={T.cream} strokeWidth="1.5" />
        <path d="M 60 10 L 75 0 L 75 15 Z" fill={T.bg3} stroke={T.cream} strokeWidth="1.5" />
        <rect x="6" y={isSteaming ? 5 : 10} width="48" height={isSteaming ? 60 : 55} fill="url(#milkfill)" opacity="0.85" />
        {/* Swirl */}
        {isSteaming && (
          <circle cx="30" cy="35" r="18" fill="none" stroke={T.cream} strokeWidth="1" opacity="0.4"
                  strokeDasharray="4 4" style={{ transformOrigin: "30px 35px", animation: "milk-swirl 3s linear infinite" }} />
        )}
        {/* Pour stream from pitcher */}
        {isPouring && (
          <line x1="75" y1="14" x2="155" y2="120" stroke={T.milk} strokeWidth="2.5" opacity="0.9">
            <animate attributeName="opacity" values="0.6;1;0.6" dur="0.5s" repeatCount="indefinite" />
          </line>
        )}
      </g>

      {/* Cup (center-right) */}
      <g transform="translate(200, 100)">
        <path d="M 0 0 L 100 0 L 92 90 Q 92 105 78 105 L 22 105 Q 8 105 8 90 Z"
              fill={T.bg3} stroke={T.cream} strokeWidth="1.5" />
        {/* Saucer */}
        <ellipse cx="50" cy="115" rx="65" ry="6" fill={T.bg3} stroke={T.cream} strokeWidth="1" />
        {/* Handle */}
        <path d="M 100 20 Q 130 20 130 50 Q 130 80 100 80" fill="none" stroke={T.cream} strokeWidth="1.5" />

        {/* Espresso base */}
        {(isPullingShot || progress > 0.05) && (
          <rect x="10" y={progress < 0.2 ? 80 - 70 * (progress / 0.2) : 10}
                width="80"
                height={progress < 0.2 ? 70 * (progress / 0.2) : 30}
                fill={T.espresso} opacity="0.95" />
        )}
        {/* Milk layer */}
        {isPouring && (
          <rect x="10" y={40 - 30 * ((progress - 0.6) / 0.4)}
                width="80"
                height={30 + 30 * ((progress - 0.6) / 0.4)}
                fill="url(#milkfill)" opacity="0.85" />
        )}
        {/* Latte art (rosetta dots) */}
        {progress > 0.9 && (<>
          <ellipse cx="50" cy="20" rx="14" ry="3" fill={T.cream} opacity="0.8" />
          <ellipse cx="50" cy="26" rx="18" ry="3" fill={T.cream} opacity="0.7" />
          <ellipse cx="50" cy="32" rx="20" ry="3" fill={T.cream} opacity="0.6" />
          <ellipse cx="50" cy="38" rx="14" ry="2" fill={T.cream} opacity="0.5" />
        </>)}
      </g>

      {/* Pulling shot indicator */}
      {isPullingShot && progress < 0.15 && (
        <g transform="translate(250, 50)">
          <rect x="0" y="0" width="40" height="20" rx="4" fill="none" stroke={T.cream} strokeWidth="1" />
          <line x1="10" y1="20" x2="10" y2="40" stroke={T.brownDeep} strokeWidth="2">
            <animate attributeName="opacity" values="0.4;1;0.4" dur="0.4s" repeatCount="indefinite" />
          </line>
          <line x1="30" y1="20" x2="30" y2="40" stroke={T.brownDeep} strokeWidth="2">
            <animate attributeName="opacity" values="0.4;1;0.4" dur="0.4s" repeatCount="indefinite" />
          </line>
        </g>
      )}
    </svg>
  );
}

function Feed({ ctx }) {
  const vp = useViewport();
  const [posts, setPosts] = useState(FEED);
  const [composing, setComposing] = useState(false);
  return (
    <div>
      <Header title="Community" right={<button onClick={() => setComposing(true)} style={iconBtn}><Plus size={16} color={T.cream} /></button>} />
      <div style={{ padding: "20px 22px", maxWidth: vp.isDesktop ? 700 : "none", margin: "0 auto" }}>
        {composing && <Composer onCancel={() => setComposing(false)}
          onPost={(c) => { setPosts([{ id: Date.now(), user: ctx.settings?.name?.toLowerCase() || "you", time: "now",
            caption: c, likes: 0, comments: 0, hue: 35 }, ...posts]); setComposing(false); }} />}
        <div style={{ display: "grid", gap: 18 }}>
          {posts.map((p) => <Post key={p.id} p={p} onLike={() => {
            setPosts((arr) => arr.map((x) => x.id === p.id ? { ...x, likes: x.likes + 1 } : x));
          }} />)}
        </div>
      </div>
    </div>
  );
}
function Post({ p, onLike }) {

        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13 }}>{p.user}</div>
          <div style={{ fontSize: 10, color: T.creamDim }}>{p.time} ago</div>

      </div>
      <div style={{ aspectRatio: "1.1", background: `radial-gradient(ellipse at 30% 30%, hsl(${p.hue}, 40%, 25%), ${T.bg})`,
        position: "relative", display: "grid", placeItems: "center" }}>
        <Coffee size={40} color={T.creamDim} strokeWidth={1} />

      <div style={{ padding: "14px 16px" }}>

function Composer({ onCancel, onPost }) {

      (pos) => { setLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude }); setLocating(false); },

/* =========================================================================
   BREW JOURNAL — log, review, get AI tweaks
   ========================================================================= */
const SCORE_AXES = [
  { key: "sweetness", label: "Sweetness", lo: "Flat", hi: "Sweet" },
  { key: "acidity", label: "Acidity", lo: "Dull", hi: "Bright" },
  { key: "body", label: "Body", lo: "Thin", hi: "Heavy" },
  { key: "bitterness", label: "Bitterness", lo: "None", hi: "Strong" },
  { key: "aftertaste", label: "Aftertaste", lo: "Short", hi: "Lingering" },
];

function LogBrew({ ctx }) {
  const vp = useViewport();
  const pending = window.__pendingBrew;

  // Allow logging even without a pending brew (manual entry)
  const [scores, setScores] = useState({
    sweetness: 5, acidity: 5, body: 5, bitterness: 3, aftertaste: 5, overall: 7,
  });
  const [notes, setNotes] = useState("");

  const setScore = (k, v) => setScores({ ...scores, [k]: v });

  const save = () => {
    const today = new Date().toLocaleDateString("en-US", { month: "short", day: "numeric" });
    const entry = {
      id: pending?.existingId || Date.now(),
      recipeId: pending?.recipeId || "manual",
      recipeTitle: pending?.recipeTitle || "Manual entry",
      method: pending?.method || ctx.method?.id || "v60",
      bean: pending?.bean || ctx.bean?.name || "Unknown",
      grinder: pending?.grinder || ctx.grinder?.name || "Unknown",
      date: today,
      dose: pending?.dose, water: pending?.water, temp: pending?.temp, clicks: pending?.clicks,
      scores, notes,
      quickLogged: false,
    };
    if (pending?.existingId) {
      // Upgrade an existing quick-log to a full entry
      ctx.setBrewLog(ctx.brewLog.map((e) => e.id === pending.existingId ? entry : e));
    } else {
      ctx.setBrewLog([entry, ...ctx.brewLog]);
    }
    window.__pendingBrew = null;
    ctx.go("journal");
  };

  return (
    <div>
      <Header title="Log This Brew" onBack={ctx.back} />
      <div style={{ padding: "26px 22px", maxWidth: vp.isDesktop ? 720 : "none", margin: "0 auto" }}>
        <div style={{ fontSize: 28, fontWeight: 200, marginBottom: 6, letterSpacing: "-0.02em" }}>
          How did it taste?
        </div>
        <div style={{ fontSize: 12, color: T.creamDim, marginBottom: 26 }}>
          {pending?.recipeTitle ? `${pending.recipeTitle} · ${pending.bean}` : "Rate the brew honestly — it helps tune next time."}
        </div>

        {pending && (
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 22 }}>
            <Pill dim>{pending.dose}g coffee</Pill>
            <Pill dim>{pending.water}g water</Pill>
            <Pill dim>{pending.temp}°C</Pill>
            <Pill dim>{pending.clicks} clicks</Pill>
          </div>
        )}

        <div style={{ display: "grid", gap: 18, marginBottom: 26 }}>
          {SCORE_AXES.map((axis) => (
            <ScoreSlider key={axis.key} axis={axis} value={scores[axis.key]}
                         onChange={(v) => setScore(axis.key, v)} />
          ))}
        </div>

        <div style={{ background: T.bg2, border: `1px solid ${T.line}`, borderRadius: 14,
                      padding: 18, marginBottom: 22 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <div>
              <div style={{ fontSize: 10, letterSpacing: "0.2em", color: T.creamDim, marginBottom: 4 }}>OVERALL</div>
              <div style={{ fontSize: 12, color: T.creamDim }}>How much did you enjoy this cup?</div>
            </div>
            <div style={{ fontSize: 32, fontWeight: 200, color: T.accent }}>{scores.overall}</div>
          </div>
          <input type="range" min="1" max="10" value={scores.overall}
                 onChange={(e) => setScore("overall", +e.target.value)}
                 style={{ width: "100%", accentColor: T.accent }} />
        </div>

        <div style={{ marginBottom: 26 }}>
          <div style={{ fontSize: 10, letterSpacing: "0.2em", color: T.creamDim, marginBottom: 8 }}>NOTES</div>
          <textarea value={notes} onChange={(e) => setNotes(e.target.value)}
                    placeholder="Bright peaks, slightly thin body, faded too quickly..."
                    style={{ ...input, minHeight: 100, resize: "none" }} />
        </div>

        <button onClick={save} style={{ ...primaryBtn, width: "100%" }}>Save to journal</button>
      </div>
    </div>
  );
}

function ScoreSlider({ axis, value, onChange }) {
  return (
    <div style={{ background: T.bg2, border: `1px solid ${T.line}`, borderRadius: 12, padding: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <div style={{ fontSize: 13, color: T.cream }}>{axis.label}</div>
        <div style={{ fontSize: 16, fontWeight: 300, color: T.accent }}>{value}<span style={{ color: T.creamDim, fontSize: 11 }}>/10</span></div>
      </div>
      <input type="range" min="1" max="10" value={value} onChange={(e) => onChange(+e.target.value)}
             style={{ width: "100%", accentColor: T.accent }} />
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: T.creamDim, marginTop: 4, letterSpacing: "0.1em" }}>
        <span>{axis.lo.toUpperCase()}</span><span>{axis.hi.toUpperCase()}</span>
      </div>
    </div>
  );
}

function Journal({ ctx }) {
  const vp = useViewport();
  const log = ctx.brewLog;
  const avgOverall = log.length ? (log.reduce((s, e) => s + e.scores.overall, 0) / log.length).toFixed(1) : "—";
  const methodCounts = useMemo(() => {
    const c = {};
    log.forEach((e) => c[e.method] = (c[e.method] || 0) + 1);
    return Object.entries(c).sort((a, b) => b[1] - a[1]);
  }, [log]);

  return (
    <div>
      <Header title="Brew Journal" onBack={ctx.back} />
      <div style={{ padding: "26px 22px", maxWidth: vp.isDesktop ? 1000 : "none", margin: "0 auto" }}>
        <div style={{ fontSize: 28, fontWeight: 200, marginBottom: 6, letterSpacing: "-0.02em" }}>Your brews</div>
        <div style={{ fontSize: 12, color: T.creamDim, marginBottom: 22 }}>
          {log.length} logged · Avg overall {avgOverall}/10
        </div>

        {/* Method breakdown */}
        {methodCounts.length > 0 && (
          <div style={{ display: "flex", gap: 8, marginBottom: 22, flexWrap: "wrap" }}>
            {methodCounts.map(([m, n]) => (
              <Pill key={m} dim>{m.toUpperCase()} · {n}</Pill>
            ))}
          </div>
        )}

        {log.length === 0 ? (
          <div style={{ padding: "60px 30px", textAlign: "center", background: T.bg2,
                        border: `1px dashed ${T.line}`, borderRadius: 16 }}>
            <Book size={28} color={T.creamDim} />
            <div style={{ fontSize: 16, marginTop: 14 }}>No brews logged yet</div>
            <div style={{ fontSize: 12, color: T.creamDim, marginTop: 8, marginBottom: 22 }}>
              Brew a recipe and tap "Log brew" when finished.
            </div>
            <button onClick={() => ctx.go("methods")} style={primaryBtn}>Start a brew</button>
          </div>
        ) : (
          <div style={{ display: "grid", gap: 14,
                        gridTemplateColumns: vp.isDesktop ? "1fr 1fr" : "1fr" }}>
            {log.map((e, i) => (
              <JournalEntry key={e.id} entry={e} ctx={ctx} idx={i} />
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function JournalEntry({ entry, ctx, idx }) {
  const e = entry;
  return (
    <div className="fade-up" style={{
      background: T.bg2, border: `1px solid ${T.line}`, borderRadius: 16,
      padding: 20, animationDelay: `${idx * 40}ms`,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 4 }}>
        <div style={{ fontSize: 15, color: T.cream }}>{e.recipeTitle}</div>
        <Pill dim>{e.date}</Pill>
      </div>
      <div style={{ fontSize: 11, color: T.creamDim, marginBottom: 14 }}>
        {e.bean} · {e.grinder}
        {e.quickLogged && <span style={{ color: T.accent, marginLeft: 8 }}>· Quick log</span>}
      </div>

      {e.quickLogged ? (
        // Minimal view for quick-logged entries
        <div style={{
          background: T.bg3, border: `1px dashed ${T.line}`, borderRadius: 10,
          padding: 14, marginBottom: 14, textAlign: "center",
        }}>
          <div style={{ fontSize: 12, color: T.creamDim, marginBottom: 8 }}>
            You rated this {e.scores.overall}/10 overall.
          </div>
          <button onClick={() => {
            window.__pendingBrew = {
              recipeId: e.recipeId, recipeTitle: e.recipeTitle, method: e.method,
              bean: e.bean, grinder: e.grinder,
              dose: e.dose, water: e.water, temp: e.temp, clicks: e.clicks,
              existingId: e.id,
            };
            ctx.go("logbrew");
          }} style={{
            background: "transparent", border: `1px solid ${T.line}`, color: T.accent,
            padding: "8px 16px", borderRadius: 999, fontSize: 11, fontFamily: FONT,
          }}>Add detailed rating →</button>
        </div>
      ) : (
        // Full scores visualization
        <div style={{ display: "grid", gap: 6, marginBottom: 14 }}>
          {SCORE_AXES.map((a) => (
            <div key={a.key} style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 11 }}>
              <div style={{ width: 70, color: T.creamDim }}>{a.label}</div>
              <div style={{ flex: 1, height: 4, background: T.bg3, borderRadius: 2, overflow: "hidden" }}>
                <div style={{ width: `${e.scores[a.key] * 10}%`, height: "100%", background: T.accent }} />
              </div>
              <div style={{ width: 18, textAlign: "right", color: T.cream }}>{e.scores[a.key]}</div>
            </div>
          ))}
        </div>
      )}

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
                    paddingTop: 12, borderTop: `1px solid ${T.line}` }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ fontSize: 10, letterSpacing: "0.2em", color: T.creamDim }}>OVERALL</div>
          <div style={{ fontSize: 18, fontWeight: 300, color: T.accent }}>{e.scores.overall}/10</div>
        </div>
        {!e.quickLogged && (
          <button onClick={() => {
            window.__pendingTweak = e;
            ctx.go("tweak");
          }} style={{
            background: T.cream, color: T.bg, border: "none",
            padding: "8px 16px", borderRadius: 999, fontSize: 11, fontFamily: FONT,
            letterSpacing: "0.1em", textTransform: "uppercase", display: "flex",
            alignItems: "center", gap: 6,
          }}>
            <Sparkles size={11} color={T.bg} /> Tweak
          </button>
        )}
      </div>

      {e.notes && (
        <div style={{ marginTop: 12, fontSize: 12, color: T.creamDim, fontStyle: "italic", lineHeight: 1.5 }}>
          "{e.notes}"
        </div>
      )}
    </div>
  );
}

/* =========================================================================
   TWEAK ENGINE — rules-based recipe coach
   ========================================================================= */
function generateTweaks(entry) {
  const s = entry.scores;
  const suggestions = [];
  const diagnoses = [];

  // BITTERNESS — too high = over-extracted
  if (s.bitterness >= 7) {
    diagnoses.push("Over-extracted — water pulled too much from the grounds.");
    suggestions.push({ axis: "Grind", change: "Coarser", detail: "Try 1-2 clicks coarser. Bigger particles slow extraction." });
    suggestions.push({ axis: "Temp", change: `Drop to ${Math.max(85, (entry.temp || 95) - 2)}°C`, detail: "Cooler water extracts less aggressively." });
    suggestions.push({ axis: "Time", change: "Pour faster", detail: "Less contact time = less bitterness pulled." });
  }

  // BITTERNESS low + ACIDITY high = under-extracted
  if (s.bitterness <= 3 && s.acidity >= 7 && s.sweetness <= 5) {
    diagnoses.push("Under-extracted — sour, sharp, lacking sweetness.");
    suggestions.push({ axis: "Grind", change: "Finer", detail: "Try 1-2 clicks finer. Smaller particles extract more." });
    suggestions.push({ axis: "Temp", change: `Up to ${Math.min(99, (entry.temp || 92) + 2)}°C`, detail: "Hotter water dissolves more compounds." });
    suggestions.push({ axis: "Time", change: "Pour slower", detail: "More contact time builds sweetness and body." });
  }

  // BODY too thin
  if (s.body <= 3) {
    diagnoses.push("Body is thin — lacks weight on the palate.");
    suggestions.push({ axis: "Ratio", change: "Stronger", detail: `Try ${Math.round((entry.water || 250) * 0.92)}g water (drop ratio by 1 point) for more concentration.` });
    if (entry.method === "v60" || entry.method === "chemex") {
      suggestions.push({ axis: "Technique", change: "Less agitation", detail: "Skip the late swirl — preserves fines that build body." });
    }
  }

  // BODY too heavy
  if (s.body >= 8 && s.bitterness >= 6) {
    diagnoses.push("Heavy and muddy — too much sediment and over-extraction.");
    suggestions.push({ axis: "Grind", change: "Coarser", detail: "Bigger grind = less sediment, cleaner cup." });
    suggestions.push({ axis: "Filter", change: "Pre-rinse longer", detail: "Removes paper taste and tightens filter pores." });
  }

  // SWEETNESS low
  if (s.sweetness <= 4 && suggestions.length === 0) {
    diagnoses.push("Lacks sweetness — extraction stopped short of sugars.");
    suggestions.push({ axis: "Time", change: "Extend bloom", detail: "Try a 45s bloom instead of 30s. CO2 release helps even extraction." });
    suggestions.push({ axis: "Grind", change: "Slightly finer", detail: "1 click finer to develop more sugar dissolution." });
  }

  // ACIDITY too high alone
  if (s.acidity >= 8 && s.bitterness <= 4 && s.sweetness <= 6 && suggestions.length === 0) {
    diagnoses.push("Bright but unbalanced — acidity dominates.");
    suggestions.push({ axis: "Temp", change: `Up to ${Math.min(99, (entry.temp || 93) + 3)}°C`, detail: "Hotter water mellows acidity." });
    suggestions.push({ axis: "Bean", change: "Try a longer rest", detail: "If beans are <7 days off-roast, wait a few days. Fresh beans read sour." });
  }

  // AFTERTASTE short
  if (s.aftertaste <= 4) {
    diagnoses.push("Aftertaste fades quickly — could be under-developed.");
    suggestions.push({ axis: "Bean", change: "Check freshness", detail: "Beans past 4 weeks lose finish. Buy with visible roast date." });
    suggestions.push({ axis: "Water", change: "Filtered, not RO", detail: "Minerals carry flavor. Pure RO water = flat finish." });
  }

  // GREAT BREW
  if (s.overall >= 8 && diagnoses.length === 0) {
    diagnoses.push("Excellent cup. Lock this recipe in.");
    suggestions.push({ axis: "Repeat", change: "Save as default", detail: "Consistency beats novelty. Run this recipe again next session." });
    suggestions.push({ axis: "Variation", change: "Try 1 variable", detail: "Want to push further? Change ONE thing — temp OR grind, never both." });
  }

  // No clear issues but mediocre
  if (diagnoses.length === 0 && s.overall < 7) {
    diagnoses.push("Balanced but unmemorable — small dial-in needed.");
    suggestions.push({ axis: "Bean", change: "Different origin", detail: "Bean might be the limit. Try a different roaster or origin." });
    suggestions.push({ axis: "Ratio", change: "Test a stronger pour", detail: `Try ${Math.round((entry.water || 250) * 0.94)}g water for more concentration.` });
  }

  return { diagnoses, suggestions };
}

function Tweak({ ctx }) {
  const vp = useViewport();
  const entry = window.__pendingTweak;
  const [question, setQuestion] = useState("");
  const [chatLog, setChatLog] = useState([]);

  if (!entry) {
    return (
      <div>
        <Header title="Tweak Recipe" onBack={ctx.back} />
        <div style={{ padding: 40, textAlign: "center", color: T.creamDim }}>
          No brew selected. Open a journal entry first.
        </div>
      </div>
    );
  }

  const { diagnoses, suggestions } = useMemo(() => generateTweaks(entry), [entry]);

  const ask = () => {
    if (!question.trim()) return;
    const q = question.trim();
    const a = answerQuestion(q, entry);
    setChatLog([...chatLog, { q, a }]);
    setQuestion("");
  };

  return (
    <div>
      <Header title="Tweak This Recipe" onBack={ctx.back} />
      <div style={{ padding: "26px 22px", maxWidth: vp.isDesktop ? 800 : "none", margin: "0 auto" }}>
        {/* Source brew summary */}
        <div style={{ background: T.bg2, border: `1px solid ${T.line}`, borderRadius: 16, padding: 20, marginBottom: 22 }}>
          <div style={{ fontSize: 10, letterSpacing: "0.2em", color: T.creamDim, marginBottom: 6 }}>BASED ON</div>
          <div style={{ fontSize: 18, fontWeight: 300, marginBottom: 8 }}>{entry.recipeTitle}</div>
          <div style={{ fontSize: 11, color: T.creamDim, marginBottom: 12 }}>{entry.bean} · {entry.date}</div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {SCORE_AXES.map((a) => (
              <Pill key={a.key} dim>{a.label}: {entry.scores[a.key]}</Pill>
            ))}
            <Pill>Overall: {entry.scores.overall}/10</Pill>
          </div>
        </div>

        {/* Diagnosis */}
        <div style={{ marginBottom: 22 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
            <Sparkles size={14} color={T.accent} />
            <div style={{ fontSize: 10, letterSpacing: "0.25em", color: T.creamDim }}>WHAT WE'RE READING</div>
          </div>
          {diagnoses.map((d, i) => (
            <div key={i} style={{ fontSize: 14, color: T.cream, lineHeight: 1.55, marginBottom: 8 }}>
              {d}
            </div>
          ))}
        </div>

        {/* Suggestions */}
        <div style={{ marginBottom: 26 }}>
          <div style={{ fontSize: 10, letterSpacing: "0.25em", color: T.creamDim, marginBottom: 14 }}>TRY NEXT TIME</div>
          <div style={{ display: "grid", gap: 10 }}>
            {suggestions.map((sug, i) => (
              <div key={i} className="fade-up" style={{
                background: T.bg2, border: `1px solid ${T.line}`, borderRadius: 12,
                padding: 16, animationDelay: `${i * 60}ms`, display: "flex", gap: 14, alignItems: "flex-start",
              }}>
                <div style={{ width: 44, flexShrink: 0 }}>
                  <div style={{ fontSize: 9, letterSpacing: "0.2em", color: T.creamDim, marginBottom: 2 }}>{sug.axis.toUpperCase()}</div>
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, color: T.accent, marginBottom: 4 }}>{sug.change}</div>
                  <div style={{ fontSize: 12, color: T.creamDim, lineHeight: 1.5 }}>{sug.detail}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Q&A */}
        <div style={{ borderTop: `1px solid ${T.line}`, paddingTop: 22 }}>
          <div style={{ fontSize: 10, letterSpacing: "0.25em", color: T.creamDim, marginBottom: 14 }}>ASK THE COACH</div>

          {chatLog.length > 0 && (
            <div style={{ display: "grid", gap: 12, marginBottom: 16 }}>
              {chatLog.map((m, i) => (
                <div key={i}>
                  <div style={{ fontSize: 12, color: T.creamDim, marginBottom: 6, fontStyle: "italic" }}>"{m.q}"</div>
                  <div style={{ background: T.bg2, border: `1px solid ${T.line}`, borderRadius: 12,
                                padding: 14, fontSize: 13, color: T.cream, lineHeight: 1.55 }}>
                    {m.a}
                  </div>
                </div>
              ))}
            </div>
          )}

          <div style={{ display: "flex", gap: 8 }}>
            <input value={question} onChange={(e) => setQuestion(e.target.value)}
                   onKeyDown={(e) => e.key === "Enter" && ask()}
                   placeholder="Why was it sour? How do I get more body?"
                   style={{ ...input, flex: 1 }} />
            <button onClick={ask} style={{ ...primaryBtn, padding: "14px 22px" }}>Ask</button>
          </div>

          <div style={{ fontSize: 10, color: T.creamDim, marginTop: 10, lineHeight: 1.5 }}>
            Try: "why is it bitter", "how do I get more sweetness", "should I change beans"
          </div>
        </div>
      </div>
    </div>
  );
}

function answerQuestion(q, entry) {
  const Q = q.toLowerCase();
  const s = entry.scores;

  if (Q.includes("bitter") || Q.includes("burnt")) {
    return s.bitterness >= 6
      ? `Your bitterness scored ${s.bitterness}/10 — this is over-extraction. Three levers: grind 1-2 clicks coarser, drop water temp by 2°C, or pour faster to reduce contact time. Try one change at a time.`
      : `Your bitterness was actually moderate (${s.bitterness}/10). If it tasted bitter to you anyway, it might be the bean's roast profile rather than your method. Try a lighter roast.`;
  }
  if (Q.includes("sour") || Q.includes("acid")) {
    return s.acidity >= 7 && s.sweetness <= 5
      ? `Bright acidity (${s.acidity}/10) without matching sweetness (${s.sweetness}/10) reads as "sour." This is under-extraction. Grind finer, raise temp to 95-96°C, or extend brew time. Also: very fresh beans (<7 days off-roast) often taste sharp until they settle.`
      : `Your acidity at ${s.acidity}/10 isn't extreme. If it tasted sour, the issue is likely lack of sweetness rather than too much acid — try grinding finer.`;
  }
  if (Q.includes("body") || Q.includes("thin") || Q.includes("watery")) {
    return s.body <= 4
      ? `Body of ${s.body}/10 is thin. Three fixes: (1) Stronger ratio — try 1:15 instead of 1:16. (2) Skip late agitation that washes fines through the filter. (3) Try a natural-process bean — they have more body than washed.`
      : `Body at ${s.body}/10 is decent. To push further, try a coarser grind paradoxically — it slows drawdown and lets more soluble compounds through.`;
  }
  if (Q.includes("sweet")) {
    return `Sweetness comes from longer extraction of sugars. You scored ${s.sweetness}/10. Extend your bloom to 45s, grind slightly finer, and ensure water is 94-96°C. Also: bean freshness matters — sweetness peaks 10-21 days post-roast.`;
  }
  if (Q.includes("bean") || Q.includes("change")) {
    return `Looking at your scores — ${s.overall}/10 overall — the bean (${entry.bean}) might not be the limit yet. Try one method tweak first. If you've already dialed in and still aren't happy, the bean is the ceiling. For your style, look at notes that match what you enjoyed.`;
  }
  if (Q.includes("temp") || Q.includes("temperature") || Q.includes("hot")) {
    return `You brewed at ${entry.temp || 93}°C. Light roasts want 94-96°C, medium 91-94°C, dark 88-92°C. If your cup was bitter, drop 2°C. If sour or thin, raise 2°C. Never exceed 99°C — kettle just off boil is ideal.`;
  }
  if (Q.includes("grind") || Q.includes("coarse") || Q.includes("fine")) {
    return `You used ${entry.clicks || "?"} clicks on ${entry.grinder}. Bitter? Coarser by 1-2 clicks. Sour or weak? Finer by 1-2 clicks. Always change ONE click at a time and brew 2-3 cups at the new setting before judging.`;
  }
  if (Q.includes("better") || Q.includes("improve") || Q.includes("good")) {
    return `Your overall was ${s.overall}/10. The biggest lift usually comes from your weakest score — yours is ${weakest(s).label} (${weakest(s).value}/10). Focus there first. Read the suggestions above for specific tweaks.`;
  }
  return `Based on your brew (overall ${s.overall}/10), the main signal is around ${weakest(s).label.toLowerCase()} (${weakest(s).value}/10) and ${strongest(s).label.toLowerCase()} (${strongest(s).value}/10). Look at the suggestions above — they target your specific score profile. Ask a more specific question if you want a deeper dive.`;
}
function weakest(s) {
  const axes = SCORE_AXES.map((a) => ({ label: a.label, value: s[a.key] }));
  return axes.sort((a, b) => a.value - b.value)[0];
}
function strongest(s) {
  const axes = SCORE_AXES.map((a) => ({ label: a.label, value: s[a.key] }));
  return axes.sort((a, b) => b.value - a.value)[0];
}
